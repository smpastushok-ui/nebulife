<!DOCTYPE html>
<html lang="uk">
<head>
  <!-- Google tag (gtag.js) — web only.
       Keep this in <head> so GA4 receives landing-page hits even if the
       React bundle is slow, cached, or fails before mounting. The Capacitor
       native shell uses capacitor://localhost / ionic://localhost and is
       intentionally skipped until native consent UI exists. -->
  <script>
    (function () {
      var GA_ID = 'G-JEELHEM0Z4';
      var isNativeShell = location.protocol === 'capacitor:' || location.protocol === 'ionic:';
      if (isNativeShell) return;

      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      window.gtag = window.gtag || gtag;

      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
      document.head.appendChild(script);

      gtag('js', new Date());
      gtag('config', GA_ID, { anonymize_ip: true });
      window.__nebulifeGAInjected = true;
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a1428" />
  <meta name="description" content="Explore the galaxy, discover cosmic objects, and photograph them with AI" />

  <!-- OpenGraph / Social sharing.
       Telegram + Facebook + LinkedIn read these. Telegram caches the
       preview ~24h per URL; force a refresh via @WebpageBot or
       https://t.me/WebpageBot if you change image/text and don't see
       the new preview right away. SVG is unreliable in Telegram —
       always link a real raster (jpg/png), >600px wide, <5 MB. -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nebulife — Explore the Living Cosmos" />
  <meta property="og:description" content="A procedural universe with stellar physics, orbital mechanics and planetary chemistry. Join the Android / iOS test group." />
  <meta property="og:image" content="https://nebulife.space/landing/landing-hero.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Nebulife — exosphere render" />
  <meta property="og:url" content="https://nebulife.space" />
  <meta property="og:site_name" content="Nebulife" />
  <meta property="og:locale" content="uk_UA" />
  <meta property="og:locale:alternate" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nebulife — Explore the Living Cosmos" />
  <meta name="twitter:description" content="A procedural universe with stellar physics, orbital mechanics and planetary chemistry." />
  <meta name="twitter:image" content="https://nebulife.space/landing/landing-hero.jpg" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
  <link rel="apple-touch-icon" href="/icon-192.svg" />
  <title>Nebulife</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000;
      overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    input, textarea { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }
    /* Safe area insets for notch/island devices */
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    #root { width: 100%; height: 100%; position: relative; }
    #game-canvas { position: absolute; top: 0; left: 0; right: 0; bottom: 48px; display: block; touch-action: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Register service worker for PWA (web only).
    // On Capacitor native (APK / iOS) the SW is skipped and any previously
    // registered one is unregistered + its caches purged — otherwise the
    // WebView would serve a STALE index.html from the SW cache that still
    // referenced removed chunk hashes, making the app look "frozen on an
    // old version" even after uninstall + reinstall.
    (function () {
      var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
      if (!('serviceWorker' in navigator)) return;
      if (isNative) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        }).catch(function () {});
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          }).catch(function () {});
        }
        return;
      }
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then(function (reg) { reg.update(); })
          .catch(function () {});
      });
    })();
  </script>
</body>
</html>
