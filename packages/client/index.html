<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a1428" />
  <meta name="description" content="Explore the galaxy, discover cosmic objects, and photograph them with AI" />

  <!-- OpenGraph / Social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nebulife — Explore Your Cosmos" />
  <meta property="og:description" content="Discover stars, planets and cosmic anomalies. Photograph them with AI. Build your cosmic archive." />
  <meta property="og:image" content="https://nebulife.space/og-image.svg" />
  <meta property="og:url" content="https://nebulife.space" />
  <meta property="og:site_name" content="Nebulife" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nebulife — Explore Your Cosmos" />
  <meta name="twitter:description" content="Discover stars, planets and cosmic anomalies. Photograph them with AI." />
  <meta name="twitter:image" content="https://nebulife.space/og-image.svg" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
  <link rel="apple-touch-icon" href="/icon-192.svg" />
  <title>Nebulife</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000;
      overscroll-behavior: none;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    input, textarea { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }
    /* Safe area insets for notch/island devices */
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    #root { width: 100%; height: 100%; position: relative; }
    #game-canvas { position: absolute; top: 0; left: 0; right: 0; bottom: 48px; display: block; touch-action: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then((reg) => { reg.update(); })
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
