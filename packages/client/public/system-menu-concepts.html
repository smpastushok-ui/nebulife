<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>System Menu Concepts — Nebulife</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #020510; color: #aabbcc; font-family: monospace; }

  h1 { text-align: center; padding: 18px 0 6px; color: #667788; font-size: 11px; letter-spacing: .15em; font-weight: normal; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 2px;
    width: 100%; height: calc(100vh - 44px);
  }

  .cell {
    position: relative;
    background: #020814;
    border: 1px solid #0d1a28;
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .cell-label {
    position: absolute; top: 10px; left: 14px;
    font-size: 9px; color: #334455; letter-spacing: .1em;
  }
  .cell-num {
    position: absolute; top: 10px; right: 14px;
    font-size: 9px; color: #222f3e;
  }

  /* ── Star dot ── */
  .star {
    width: 14px; height: 14px; border-radius: 50%;
    cursor: pointer; position: relative; z-index: 5;
    box-shadow: 0 0 12px 4px currentColor;
    transition: transform .15s;
  }
  .star:hover { transform: scale(1.25); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: rgba(10,20,35,0.97); border: 1px solid #334455;
    padding: 6px 16px; border-radius: 4px; font-size: 11px; color: #88ccaa;
    pointer-events: none; opacity: 0; transition: opacity .2s;
    z-index: 9999; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ──────────────────────────────────────────────────────────────── */
  /* CONCEPT 1 — Пульс (Near-star card)                             */
  /* ──────────────────────────────────────────────────────────────── */
  #c1-menu {
    position: absolute;
    width: 200px;
    background: rgba(8,14,26,0.98);
    border-radius: 4px;
    overflow: hidden;
    transform-origin: top left;
    pointer-events: none;
    opacity: 0;
    transform: scale(.88);
    transition: opacity .2s ease-out, transform .2s ease-out;
  }
  #c1-menu.open {
    pointer-events: auto; opacity: 1; transform: scale(1);
  }
  #c1-menu .accent { height: 2px; background: #4488aa; }
  #c1-menu .hdr { padding: 8px 12px 6px; font-size: 12px; color: #ccddee; border-bottom: 1px solid #0d1a28; }
  #c1-menu .hdr small { display: block; font-size: 8px; color: #445566; margin-top: 2px; }
  #c1-menu button {
    display: block; width: 100%; padding: 9px 12px; background: none; border: none;
    color: #8899aa; font-family: monospace; font-size: 11px; text-align: left;
    cursor: pointer; border-bottom: 1px solid rgba(20,32,48,.5);
    transition: background .12s, color .12s;
  }
  #c1-menu button:hover { background: rgba(40,65,95,.45); color: #bbccdd; }
  #c1-menu button.primary { color: #88ccaa; }
  #c1-menu button.dim { color: #445566; cursor: default; }

  /* ──────────────────────────────────────────────────────────────── */
  /* CONCEPT 2 — Термінал (Terminal popup)                           */
  /* ──────────────────────────────────────────────────────────────── */
  #c2-menu {
    position: absolute;
    width: 260px;
    background: rgba(4,8,16,0.99);
    border: 1px solid #1a2d42;
    border-radius: 3px;
    padding: 12px 14px;
    pointer-events: none; opacity: 0;
    transition: opacity .1s;
  }
  #c2-menu.open { pointer-events: auto; opacity: 1; }
  #c2-menu .t-line {
    font-size: 11px; color: #667788; margin-bottom: 2px;
    opacity: 0; transition: opacity .08s;
  }
  #c2-menu .t-line.vis { opacity: 1; }
  #c2-menu .t-hdr { color: #4488aa; margin-bottom: 8px; }
  #c2-menu .t-line span.cursor {
    display: inline-block; width: 7px; height: 11px;
    background: #4488aa; margin-left: 2px; vertical-align: text-bottom;
    animation: blink .8s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #c2-menu button {
    display: block; width: 100%; padding: 5px 0; background: none; border: none;
    color: #556677; font-family: monospace; font-size: 11px; text-align: left;
    cursor: pointer; transition: color .1s;
    opacity: 0; transform: none;
  }
  #c2-menu button.vis { opacity: 1; }
  #c2-menu button:hover { color: #88ccaa; }
  #c2-menu button::before { content: '> '; color: #223344; }
  #c2-menu button:hover::before { color: #44ff88; }

  /* ──────────────────────────────────────────────────────────────── */
  /* CONCEPT 3 — Команди (Radial arc)                                */
  /* ──────────────────────────────────────────────────────────────── */
  .radial-btn {
    position: absolute;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(8,16,28,0.96); border: 1px solid #1a2d42;
    color: #8899aa; font-family: monospace; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transform: scale(0);
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .radial-btn.open { pointer-events: auto; }
  .radial-btn:hover { background: rgba(30,55,85,.7); color: #ccddee; box-shadow: 0 0 10px rgba(68,136,170,.4); }
  .radial-tooltip {
    position: absolute; bottom: 46px; left: 50%; transform: translateX(-50%);
    background: rgba(8,14,26,.98); border: 1px solid #1a2d42;
    padding: 3px 8px; border-radius: 3px; font-size: 9px; color: #8899aa;
    white-space: nowrap; pointer-events: none; opacity: 0;
    transition: opacity .1s;
  }
  .radial-btn:hover .radial-tooltip { opacity: 1; }

  /* ──────────────────────────────────────────────────────────────── */
  /* CONCEPT 4 — Планшет (Holographic card)                          */
  /* ──────────────────────────────────────────────────────────────── */
  #c4-menu {
    position: absolute;
    width: 280px;
    background: rgba(6,11,20,0.97);
    border: 1px solid #1a3a55;
    border-radius: 5px; overflow: hidden;
    pointer-events: none; opacity: 0;
    transform: translateY(18px);
    transition: opacity .22s ease-out, transform .22s ease-out;
  }
  #c4-menu.open { pointer-events: auto; opacity: 1; transform: translateY(0); }
  #c4-menu::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(68,136,200,.025) 3px, rgba(68,136,200,.025) 4px);
    pointer-events: none; z-index: 0;
    animation: scanlines 8s linear infinite;
  }
  @keyframes scanlines { 0%{background-position:0 0} 100%{background-position:0 40px} }
  #c4-menu .c4-hdr {
    padding: 12px 14px 10px; border-bottom: 1px solid #0d1e30;
    position: relative; z-index: 1;
  }
  #c4-menu .c4-hdr .name { font-size: 13px; color: #ccddee; }
  #c4-menu .c4-hdr .sub  { font-size: 8px; color: #4488aa; letter-spacing: .1em; margin-top: 3px; }
  #c4-menu .c4-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: #0a1825; position: relative; z-index: 1;
  }
  #c4-menu button {
    padding: 11px 12px; background: rgba(8,16,30,0.9); border: none;
    color: #778899; font-family: monospace; font-size: 10px; text-align: left;
    cursor: pointer; transition: background .12s, color .12s;
  }
  #c4-menu button:hover { background: rgba(30,55,85,.6); color: #aabbcc; }
  #c4-menu button.c4-primary { color: #88ccaa; }
  #c4-menu button.c4-blue { color: #4488aa; }

  /* ──────────────────────────────────────────────────────────────── */
  /* CONCEPT 5 — Дошка (Bottom action bar)                           */
  /* ──────────────────────────────────────────────────────────────── */
  #c5-bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 68px;
    background: rgba(6,11,22,0.97);
    border-top: 1px solid #1a2d42;
    display: flex; align-items: center; gap: 0;
    pointer-events: none; opacity: 0;
    transform: translateY(68px);
    transition: opacity .22s ease-out, transform .22s ease-out;
  }
  #c5-bar.open { pointer-events: auto; opacity: 1; transform: translateY(0); }
  #c5-bar .c5-info {
    padding: 0 18px; border-right: 1px solid #1a2d42; min-width: 140px;
  }
  #c5-bar .c5-info .name { font-size: 12px; color: #ccddee; }
  #c5-bar .c5-info .sub  { font-size: 8px; color: #4488aa; margin-top: 3px; }
  #c5-bar .c5-actions { display: flex; flex: 1; gap: 1px; padding: 0 8px; }
  #c5-bar button {
    flex: 1; height: 68px; background: none; border: none; border-right: 1px solid #0d1a28;
    color: #667788; font-family: monospace; font-size: 10px;
    cursor: pointer; transition: background .12s, color .12s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  }
  #c5-bar button:hover { background: rgba(30,55,85,.35); color: #aabbcc; }
  #c5-bar button .icon { font-size: 16px; }
  #c5-bar button.c5-primary { color: #88ccaa; }
  #c5-bar .c5-close {
    width: 50px; height: 68px; flex-shrink: 0;
    background: none; border: none; border-left: 1px solid #1a2d42;
    color: #334455; font-size: 18px; cursor: pointer;
    transition: color .12s;
  }
  #c5-bar .c5-close:hover { color: #cc4444; }

  /* ──────────────────────────────────────────────────────────────── */
  /* CONCEPT 6 — Мінімал (Floating command list)                     */
  /* ──────────────────────────────────────────────────────────────── */
  #c6-menu {
    position: absolute;
    width: 190px;
    background: rgba(5,9,18,0.94);
    backdrop-filter: blur(8px);
    border-radius: 3px;
    padding: 10px 0 6px;
    pointer-events: none; opacity: 1;
    clip-path: inset(0 0 100% 0);
    transition: clip-path .18s ease-out;
  }
  #c6-menu.open { pointer-events: auto; clip-path: inset(0 0 0% 0); }
  #c6-menu .c6-name {
    padding: 0 14px 8px; font-size: 12px; font-weight: bold;
    border-bottom: 1px solid rgba(68,136,170,.2); margin-bottom: 4px;
  }
  #c6-menu button {
    display: block; width: 100%;
    padding: 8px 14px; background: none; border: none;
    color: #556677; font-family: monospace; font-size: 11px; text-align: left;
    cursor: pointer; letter-spacing: .06em;
    transition: color .12s, padding-left .12s;
  }
  #c6-menu button:hover { color: #aabbcc; padding-left: 20px; }
  #c6-menu button.c6-green { color: #44aa77; }
  #c6-menu button.c6-green:hover { color: #55cc88; }
  #c6-menu .c6-sep { height: 1px; background: rgba(30,50,70,.5); margin: 4px 0; }
</style>
</head>
<body>

<h1>SYSTEM MENU — 6 КОНЦЕПТІВ</h1>

<div class="grid">

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- CELL 1 — Пульс                                               -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <div class="cell" id="cell1">
    <div class="cell-label">01 — ПУЛЬС</div>
    <div class="cell-num">#1</div>
    <div class="star" style="color:#4488aa;background:#4488aa" id="star1"></div>

    <div id="c1-menu" style="top:calc(50% - 10px); left:calc(50% + 18px)">
      <div class="accent"></div>
      <div class="hdr">
        Kepler-442
        <small>G2V &nbsp;|&nbsp; 5 планет</small>
      </div>
      <button class="primary" onclick="toast('До системи')">До системи</button>
      <button onclick="toast('Об\'єкти')">Об'єкти системи</button>
      <button onclick="toast('Характеристики')">Характеристики</button>
      <button onclick="toast('Перейменувати')">Перейменувати</button>
      <button class="dim">Дослідити</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- CELL 2 — Термінал                                            -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <div class="cell" id="cell2">
    <div class="cell-label">02 — ТЕРМІНАЛ</div>
    <div class="cell-num">#2</div>
    <div class="star" style="color:#cc8844;background:#cc8844" id="star2"></div>

    <div id="c2-menu" style="top:calc(50% - 20px); left:calc(50% + 20px)">
      <div class="t-line t-hdr" id="t-hdr">
        <span id="t-hdr-text"></span><span class="cursor" id="t-cursor"></span>
      </div>
      <div id="t-items"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- CELL 3 — Команди (Radial)                                    -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <div class="cell" id="cell3">
    <div class="cell-label">03 — РАДІАЛЬНІ</div>
    <div class="cell-num">#3</div>
    <div class="star" style="color:#44cc88;background:#44cc88" id="star3"></div>
    <div id="c3-radial"></div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- CELL 4 — Планшет (Holographic)                               -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <div class="cell" id="cell4">
    <div class="cell-label">04 — ГОЛОГРАМА</div>
    <div class="cell-num">#4</div>
    <div class="star" style="color:#cc44aa;background:#cc44aa" id="star4"></div>

    <div id="c4-menu" style="top:calc(50% - 80px); left:calc(50% + 20px)">
      <div class="c4-hdr">
        <div class="name">Wolf-1061</div>
        <div class="sub">M3V &nbsp;///&nbsp; 3 ПЛАНЕТИ &nbsp;///&nbsp; ДОСЛІДЖЕНО</div>
      </div>
      <div class="c4-grid">
        <button class="c4-primary" onclick="toast('До системи')">До системи</button>
        <button class="c4-blue" onclick="toast('Об\'єкти')">Об'єкти</button>
        <button onclick="toast('Характеристики')">Характеристики</button>
        <button onclick="toast('Перейменувати')">Перейменувати</button>
        <button onclick="toast('Панорама')">Панорама — 30⚛</button>
        <button onclick="toast('Зонд')">Відправити зонд</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- CELL 5 — Дошка (Bottom bar)                                  -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <div class="cell" id="cell5">
    <div class="cell-label">05 — ПАНЕЛЬ ЗНИЗУ</div>
    <div class="cell-num">#5</div>
    <div class="star" style="color:#aacc44;background:#aacc44" id="star5"></div>

    <div id="c5-bar">
      <div class="c5-info">
        <div class="name">Tau Ceti</div>
        <div class="sub">G8V &nbsp;|&nbsp; 7 ПЛАНЕТ</div>
      </div>
      <div class="c5-actions">
        <button class="c5-primary" onclick="toast('До системи')">
          <span class="icon">&#x2192;</span>
          <span>До системи</span>
        </button>
        <button onclick="toast('Об\'єкти')">
          <span class="icon">&#x25CB;</span>
          <span>Об'єкти</span>
        </button>
        <button onclick="toast('Характеристики')">
          <span class="icon">&#x2261;</span>
          <span>Параметри</span>
        </button>
        <button onclick="toast('Перейменувати')">
          <span class="icon">&#x270E;</span>
          <span>Назва</span>
        </button>
        <button onclick="toast('Панорама')">
          <span class="icon">&#x25A1;</span>
          <span>Панорама</span>
        </button>
      </div>
      <button class="c5-close" onclick="closeAll()">&#x00D7;</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- CELL 6 — Мінімал                                             -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <div class="cell" id="cell6">
    <div class="cell-label">06 — МІНІМАЛ</div>
    <div class="cell-num">#6</div>
    <div class="star" style="color:#cc8844;background:#ff9955" id="star6"></div>

    <div id="c6-menu" style="top:calc(50% - 70px); left:calc(50% + 20px)">
      <div class="c6-name" style="color:#cc8855">Proxima-7</div>
      <button class="c6-green" onclick="toast('До системи')">до системи</button>
      <button onclick="toast('Об\'єкти')">об'єкти системи</button>
      <div class="c6-sep"></div>
      <button onclick="toast('Характеристики')">характеристики</button>
      <button onclick="toast('Перейменувати')">перейменувати</button>
      <div class="c6-sep"></div>
      <button onclick="toast('Дослідити')" style="color:#4488aa">дослідити</button>
    </div>
  </div>

</div><!-- /grid -->

<div class="toast" id="toast"></div>

<script>
// ── Utilities ───────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1400);
}

let openCell = null;
function closeAll() {
  openCell = null;
  document.getElementById('c1-menu').classList.remove('open');
  document.getElementById('c2-menu').classList.remove('open');
  closeRadial();
  document.getElementById('c4-menu').classList.remove('open');
  document.getElementById('c5-bar').classList.remove('open');
  document.getElementById('c6-menu').classList.remove('open');
}

// Close on backdrop click inside cell (but not on star or menu)
document.querySelectorAll('.cell').forEach(cell => {
  cell.addEventListener('click', e => {
    if (e.target.closest('.star') || e.target.closest('#c1-menu') ||
        e.target.closest('#c2-menu') || e.target.closest('.radial-btn') ||
        e.target.closest('#c4-menu') || e.target.closest('#c5-bar') ||
        e.target.closest('#c6-menu')) return;
    closeAll();
  });
});

// ── Concept 1 — Пульс ───────────────────────────────────────
document.getElementById('star1').addEventListener('click', e => {
  e.stopPropagation();
  const m = document.getElementById('c1-menu');
  const was = m.classList.contains('open');
  closeAll();
  if (!was) m.classList.add('open');
});

// ── Concept 2 — Термінал ────────────────────────────────────
const T_ITEMS = ['До системи', "Об'єкти системи", 'Характеристики', 'Перейменувати', 'Дослідити'];
let termTimer = [];

function clearTermTimers() { termTimer.forEach(clearTimeout); termTimer = []; }

function runTerminal() {
  const menu = document.getElementById('c2-menu');
  const hdrText = document.getElementById('t-hdr-text');
  const cursor  = document.getElementById('t-cursor');
  const items   = document.getElementById('t-items');

  clearTermTimers();
  hdrText.textContent = '';
  items.innerHTML = '';
  cursor.style.display = 'inline-block';
  menu.classList.add('open');

  // Type header
  const name = 'VEGA-12';
  name.split('').forEach((ch, i) => {
    termTimer.push(setTimeout(() => { hdrText.textContent += ch; }, i * 45));
  });

  termTimer.push(setTimeout(() => { cursor.style.display = 'none'; }, name.length * 45 + 200));

  // Reveal items
  T_ITEMS.forEach((lbl, i) => {
    termTimer.push(setTimeout(() => {
      const btn = document.createElement('button');
      btn.textContent = lbl;
      btn.className = 'vis';
      if (i === 0) btn.style.color = '#88ccaa';
      btn.onclick = () => toast(lbl);
      items.appendChild(btn);
    }, name.length * 45 + 120 + i * 70));
  });
}

document.getElementById('star2').addEventListener('click', e => {
  e.stopPropagation();
  const m = document.getElementById('c2-menu');
  const was = m.classList.contains('open');
  closeAll();
  if (!was) runTerminal();
});

// ── Concept 3 — Радіальні ───────────────────────────────────
const R_ITEMS = [
  { icon: '→', label: 'До системи',      color: '#88ccaa' },
  { icon: '○', label: "Об'єкти",          color: '#778899' },
  { icon: '≡', label: 'Характеристики',  color: '#778899' },
  { icon: '✎', label: 'Перейменувати',   color: '#778899' },
  { icon: '◎', label: 'Дослідити',       color: '#4488aa' },
];
let radialBtns = [];
let radialTimers = [];

function closeRadial() {
  radialTimers.forEach(clearTimeout); radialTimers = [];
  radialBtns.forEach(b => { b.style.opacity = '0'; b.style.transform = 'scale(0)'; b.classList.remove('open'); });
}

function buildRadial() {
  const container = document.getElementById('c3-radial');
  container.innerHTML = '';
  radialBtns = [];

  const star = document.getElementById('star3');
  const cell = document.getElementById('cell3');
  const sr = star.getBoundingClientRect();
  const cr = cell.getBoundingClientRect();
  const cx = sr.left - cr.left + sr.width / 2;
  const cy = sr.top  - cr.top  + sr.height / 2;

  const radius = 62;
  const startAngle = -160; // degrees, going from bottom-left to top-right

  R_ITEMS.forEach((item, i) => {
    const angle = (startAngle + i * 40) * Math.PI / 180;
    const bx = cx + Math.cos(angle) * radius - 20;
    const by = cy + Math.sin(angle) * radius - 20;

    const btn = document.createElement('div');
    btn.className = 'radial-btn';
    btn.style.left = bx + 'px';
    btn.style.top  = by + 'px';
    btn.style.color = item.color;
    btn.style.transition = `opacity .15s, transform .22s cubic-bezier(.34,1.56,.64,1), background .15s, color .15s, box-shadow .15s`;
    btn.innerHTML = `${item.icon}<div class="radial-tooltip">${item.label}</div>`;
    btn.addEventListener('click', e => { e.stopPropagation(); toast(item.label); });
    container.appendChild(btn);
    radialBtns.push(btn);
  });
}

function openRadial() {
  buildRadial();
  radialBtns.forEach((btn, i) => {
    radialTimers.push(setTimeout(() => {
      btn.style.opacity = '1';
      btn.style.transform = 'scale(1)';
      btn.classList.add('open');
    }, i * 55));
  });
}

document.getElementById('star3').addEventListener('click', e => {
  e.stopPropagation();
  const anyOpen = radialBtns.some(b => b.classList.contains('open'));
  closeAll();
  if (!anyOpen) openRadial();
});
