<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#0a1428"/>
      <stop offset="100%" style="stop-color:#020510"/>
    </radialGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="30%">
      <stop offset="0%" style="stop-color:#4488aa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4488aa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="25%">
      <stop offset="0%" style="stop-color:#44ff88;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#44ff88;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1.2" fill="#aabbcc" opacity="0.6"/>
  <circle cx="300" cy="150" r="0.8" fill="#aabbcc" opacity="0.4"/>
  <circle cx="500" cy="60" r="1.5" fill="#aabbcc" opacity="0.7"/>
  <circle cx="750" cy="120" r="1" fill="#aabbcc" opacity="0.5"/>
  <circle cx="950" cy="80" r="1.3" fill="#aabbcc" opacity="0.6"/>
  <circle cx="1100" cy="180" r="0.9" fill="#aabbcc" opacity="0.4"/>
  <circle cx="200" cy="400" r="1.1" fill="#aabbcc" opacity="0.5"/>
  <circle cx="400" cy="500" r="0.7" fill="#aabbcc" opacity="0.3"/>
  <circle cx="850" cy="450" r="1.4" fill="#aabbcc" opacity="0.6"/>
  <circle cx="1050" cy="520" r="1" fill="#aabbcc" opacity="0.4"/>
  <circle cx="650" cy="550" r="0.8" fill="#aabbcc" opacity="0.35"/>
  <circle cx="150" cy="250" r="1" fill="#aabbcc" opacity="0.45"/>
  <circle cx="1000" cy="300" r="1.2" fill="#aabbcc" opacity="0.55"/>

  <!-- Central planet-like circle -->
  <circle cx="600" cy="280" r="80" fill="none" stroke="#334455" stroke-width="0.5" opacity="0.3"/>
  <circle cx="600" cy="280" r="120" fill="none" stroke="#334455" stroke-width="0.3" opacity="0.2"/>
  <circle cx="600" cy="280" r="40" fill="#0a1830" opacity="0.6"/>
  <circle cx="590" cy="270" r="35" fill="none" stroke="#4488aa" stroke-width="0.8" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="430" text-anchor="middle" font-family="monospace" font-size="64" font-weight="bold" fill="#ddeeff" letter-spacing="8">NEBULIFE</text>

  <!-- Subtitle -->
  <text x="600" y="475" text-anchor="middle" font-family="monospace" font-size="18" fill="#667788" letter-spacing="4">EXPLORE YOUR COSMOS</text>

  <!-- Accent line -->
  <line x1="450" y1="500" x2="750" y2="500" stroke="#4488aa" stroke-width="1" opacity="0.4"/>

  <!-- Bottom tagline -->
  <text x="600" y="540" text-anchor="middle" font-family="monospace" font-size="13" fill="#556677" letter-spacing="2">Discover stars, planets and cosmic anomalies</text>
  <text x="600" y="565" text-anchor="middle" font-family="monospace" font-size="13" fill="#556677" letter-spacing="2">Photograph them with AI</text>
</svg>
